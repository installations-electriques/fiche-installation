<html lang="fr">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Installation Électrique</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6f8;color:#23272b;min-height:100vh}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;left:-400px;width:380px;max-width:90vw;height:100vh;background:#fff;box-shadow:2px 0 16px rgba(0,0,0,0.12);z-index:200;transition:left .3s ease;display:flex;flex-direction:column}
.sidebar.open{left:0}
.sidebar-header{padding:24px 20px 12px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.sidebar-header h2{font-size:1.1rem;font-weight:600}
.sidebar-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666;padding:4px 8px;border-radius:4px}
.sidebar-close:hover{background:#f0f0f0}
.sidebar-body{flex:1;overflow-y:auto;padding:16px 20px}
.history-entry{padding:16px 0;border-bottom:1px solid #f0f0f0}
.history-entry:last-child{border-bottom:none}
.history-date{font-size:.8rem;color:#888;margin-bottom:4px}
.history-tech{font-size:.85rem;font-weight:600;margin-bottom:8px}
.history-snapshot{font-size:.82rem;color:#444;line-height:1.6}
.history-snapshot .snap-label{color:#888;font-weight:500}
.history-snapshot .snap-value{color:#23272b}
.history-snapshot .snap-changed{background:#fef3c7;padding:1px 4px;border-radius:3px}
.history-empty{color:#aaa;font-size:.9rem;margin-top:20px;text-align:center}

.top-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:10px 24px 10px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50}
.top-bar-logo{height:32px;width:auto;margin-right:4px}
.menu-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#333;padding:4px 8px;border-radius:6px;line-height:1}
.menu-btn:hover{background:#f0f0f0}
.top-bar h1{font-size:1.1rem;font-weight:600}
.top-bar-actions{margin-left:auto;display:flex;gap:10px}

.btn{padding:8px 18px;border:none;border-radius:6px;font-size:.88rem;cursor:pointer;font-weight:500;transition:background .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#e5e7eb;color:#333}
.btn-secondary:hover{background:#d1d5db}
.btn-danger{background:#dc2626;color:#fff;padding:4px 12px;font-size:.8rem}
.btn-danger:hover{background:#b91c1c}
.btn-success{background:#16a34a;color:#fff;padding:6px 14px;font-size:.84rem}
.btn-success:hover{background:#15803d}
.btn-toggle{background:none;border:1px solid #d1d5db;color:#555;padding:6px 16px;font-size:.84rem;border-radius:6px;cursor:pointer}
.btn-toggle:hover{background:#f0f0f0}

.main-container{max-width:720px;margin:32px auto;padding:0 20px 60px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:28px 28px 20px;margin-bottom:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.card-title{font-size:.95rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin:0}
.card-title-standalone{font-size:.95rem;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.field-row{display:flex;align-items:baseline;padding:10px 0;border-bottom:1px solid #fafafa;gap:12px}
.field-row:last-child{border-bottom:none}
.field-label{flex:0 0 280px;font-size:.88rem;color:#666;font-weight:500}
.field-value{flex:1;font-size:.95rem;color:#23272b;word-break:break-word}
.field-value.empty{color:#bbb;font-style:italic}

.field-input{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:.9rem;font-family:inherit;background:#fafbfc;color:#23272b}
.field-input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.1)}
.field-input:disabled{background:#f0f0f0;color:#999;cursor:not-allowed}
textarea.field-input{min-height:80px;resize:vertical}
.input-group{display:flex;align-items:center;gap:8px}
.input-group .unit{font-size:.85rem;color:#888;white-space:nowrap}

.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.82rem;font-weight:600}
.badge-bon{background:#d1fae5;color:#065f46}
.badge-moyen{background:#fef3c7;color:#92400e}
.badge-mauvais{background:#fee2e2;color:#991b1b}
.badge-oui{background:#d1fae5;color:#065f46}
.badge-non{background:#fee2e2;color:#991b1b}

.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:32px;width:380px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,0.15)}
.modal h3{margin-bottom:8px;font-size:1.05rem}
.modal p{font-size:.88rem;color:#666;margin-bottom:18px;line-height:1.5}
.modal-input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:.95rem;margin-bottom:8px}
.modal-input:focus{outline:none;border-color:#2563eb}
.modal-error{color:#dc2626;font-size:.82rem;margin-bottom:12px;min-height:1.2em}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.loading{text-align:center;padding:60px 20px;color:#888;font-size:.95rem}

.interventions-table{width:100%;border-collapse:collapse;margin-top:10px}
.interventions-table th{text-align:left;font-size:.82rem;color:#888;font-weight:600;padding:8px 10px;border-bottom:2px solid #e5e7eb}
.interventions-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;font-size:.88rem;vertical-align:top}
.interventions-table tr:last-child td{border-bottom:none}
.interventions-table .col-date{width:120px}
.interventions-table .col-actions{width:50px;text-align:center}
.interventions-empty{color:#aaa;font-size:.88rem;font-style:italic;padding:14px 0}
.interventions-add{margin-top:12px;display:flex;gap:8px;align-items:flex-start}
.interventions-add .add-date{width:130px}
.interventions-add .add-desc{flex:1;min-height:36px}

@media(max-width:600px){
  .field-row{flex-direction:column;gap:4px}
  .field-label{flex:none;font-size:.82rem}
  .card{padding:20px 18px 16px}
  .main-container{padding:0 10px 40px;margin-top:20px}
  .top-bar{padding:10px 16px}
  .interventions-add{flex-direction:column}
  .interventions-add .add-date{width:100%}
}
</style>
</head>

      html += '<option value="'+opt+'" '+sel+'>'+display+'</option>';
    });
    html += '</select></div></div>';

    // Contrôle différentiel
    var seuilVal = currentData.controle_seuil || "";
    html += '<div class="field-row"><div class="field-label">'+label+'</div>';
    html += '<div class="field-value"><div class="input-group">';
    html += '<input type="number" class="field-input" id="input_controle_seuil" value="'+seuilVal+'">';
    html += '<span class="unit">mA</span></div></div></div>';

    // Vérifications oui/non
    Object.keys(VERIF_FIELDS).forEach(function(key){
      var v = VERIF_FIELDS[key];
      var val = currentData[key] || "";
      html += '<div class="field-row"><div class="field-label">'+v.label+'</div>';
      html += '<div class="field-value"><select class="field-input" id="input_'+key+'">';
      ["","Oui","Non"].forEach(function(opt){
        var sel = (opt === val) ? "selected" : "";
        var display = opt === "" ? "-- Choisir --" : opt;
        html += '<option value="'+opt+'" '+sel+'>'+display+'</option>';
      });
      html += '</select></div></div>';
    });

    html += '<div style="text-align:center;padding-top:12px">';
    html += '<button class="btn btn-toggle" id="toggleControle">Masquer les informations de contrôle</button>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  // ============================================================
  //  RENDU MODE LECTURE
  // ============================================================
  function renderView(){
    var html = "";

    SECTIONS.forEach(function(sec){
      html += '<div class="card"><div class="card-title-standalone">'+sec.title+'</div>';
      sec.fields.forEach(function(key){
        var f = FIELDS[key];
        var val = currentData[key] || "";
        var fieldLabel = f.label;
        var displayVal;

        if(key==="etat"){
          displayVal = renderEtat(val);
        } else if(key==="type_coffrage"){
          displayVal = renderTypeArmoire(val);
        } else if(f.type==="date"){
          displayVal = val ? formatDate(val) : '<span class="empty">Non renseigné</span>';
        } else if(f.type==="ma"){
          displayVal = val ? val+" mA" : '<span class="empty">Non renseigné</span>';
        } else if(f.type==="textarea"){
          displayVal = val ? val.replace(/\n/g,"<br>") : '<span class="empty">Non renseigné</span>';
        } else {
          displayVal = val ? val : '<span class="empty">Non renseigné</span>';
        }

        html += '<div class="field-row">';
        html += '<div class="field-label">'+fieldLabel+'</div>';
        html += '<div class="field-value">'+displayVal+'</div>';
        html += '</div>';
      });
      html += '</div>';
    });

    html += renderControleView();
    html += renderInterventionsView();
    mainContent.innerHTML = html;
    bindToggleControle();
  }

  // ============================================================
  //  RENDU MODE ÉDITION
  // ============================================================
  function renderEdit(){
    var label = currentData.label_controle || "Contrôle différentiel (mA)";
    var html = "";

    if(accessLevel === "admin"){
      html += '<div class="card"><div class="card-title-standalone">Configuration</div>';
      html += '<div class="field-row">';
      html += '<div class="field-label">Nom du contrôle (mA)</div>';
      html += '<div class="field-value"><input type="text" class="field-input" id="input_label_controle" value="'+label+'"></div>';
      html += '</div></div>';
    }

    SECTIONS.forEach(function(sec){
      html += '<div class="card"><div class="card-title-standalone">'+sec.title+'</div>';
      sec.fields.forEach(function(key){
        var f = FIELDS[key];
        var val = currentData[key] || "";
        var fieldLabel = f.label;
        var disabled = "";

        if(accessLevel === "tech" && f.level === "admin"){
          disabled = "disabled";
        }

        html += '<div class="field-row">';
        html += '<div class="field-label">'+fieldLabel+'</div>';
        html += '<div class="field-value">';

        if(f.type === "type_armoire"){
          html += buildTypeArmoireSelect(val, accessLevel === "tech");
        } else if(f.type === "select"){
          html += '<select class="field-input" id="input_'+key+'" '+disabled+'>';
          f.options.forEach(function(opt){
            var sel = (opt === val) ? "selected" : "";
            var display = opt === "" ? "-- Choisir --" : opt;
            html += '<option value="'+opt+'" '+sel+'>'+display+'</option>';
          });
          html += '</select>';
        } else if(f.type === "textarea"){
          html += '<textarea class="field-input" id="input_'+key+'" '+disabled+'>'+val+'</textarea>';
        } else if(f.type === "ma"){
          html += '<div class="input-group">';
          html += '<input type="number" class="field-input" id="input_'+key+'" value="'+val+'" '+disabled+'>';
          html += '<span class="unit">mA</span></div>';
        } else if(f.type === "date"){
          html += '<input type="date" class="field-input" id="input_'+key+'" value="'+val+'" '+disabled+'>';
        } else {
          html += '<input type="text" class="field-input" id="input_'+key+'" value="'+(val || "").replace(/"/g,"&quot;")+'" '+disabled+'>';
        }

        html += '</div></div>';
      });
      html += '</div>';
    });

    html += renderControleEdit();
    html += renderInterventionsEdit();
    mainContent.innerHTML = html;
    bindToggleControle();
    bindInterventionEvents();
  }

  // ============================================================
  //  TOGGLE CONTRÔLE
  // ============================================================
  function bindToggleControle(){
    var btn = document.getElementById("toggleControle");
    if(btn){
      btn.addEventListener("click", function(){
        controleVisible = !controleVisible;
        if(editMode){ renderEdit(); } else { renderView(); }
      });
    }
  }

  // ============================================================
  //  CHARGER LES DONNÉES
  // ============================================================
  async function loadData(){
    var {data, error} = await supabase
      .from("installations")
      .select("*")
      .eq("id", installationId)
      .single();

    if(error || !data){
      mainContent.innerHTML = '<div class="loading">Installation introuvable (id='+installationId+')</div>';
      return;
    }
    currentData = data;
    await loadInterventions();
    renderView();
  }

  // ============================================================
  //  CHARGER LES INTERVENTIONS
  // ============================================================
  async function loadInterventions(){
    var {data, error} = await supabase
      .from("interventions")
      .select("*")
      .eq("installation_id", installationId)
      .order("created_at", {ascending: true});

    interventions = (error || !data) ? [] : data;
  }

  // ============================================================
  //  CHARGER L'HISTORIQUE (COMPLET AVEC SNAPSHOT)
  // ============================================================
  async function loadHistory(){
    var {data, error} = await supabase
      .from("historique")
      .select("*")
      .eq("installation_id", installationId)
      .order("date_modification", {ascending: false});

    if(error || !data || data.length === 0){
      historyList.innerHTML = '<div class="history-empty">Aucune modification enregistrée.</div>';
      return;
    }

    var allLabels = getAllFieldLabels();
    var html = "";
    data.forEach(function(entry){
      var changedFields = [];
      try { changedFields = JSON.parse(entry.modifications); } catch(e){ changedFields = []; }
      var snapshot = {};
      try { if(entry.snapshot) snapshot = JSON.parse(entry.snapshot); } catch(e){ snapshot = {}; }

      html += '<div class="history-entry">';
      html += '<div class="history-date">'+formatTimestamp(entry.date_modification)+'</div>';
      html += '<div class="history-tech">'+(entry.technicien || "Inconnu")+'</div>';
      html += '<div class="history-snapshot">';

      // Afficher tous les champs avec mise en évidence des modifiés
      var allKeys = Object.keys(FIELDS).concat(Object.keys(VERIF_FIELDS)).concat(["label_controle"]);
      allKeys.forEach(function(key){
        var lbl = allLabels[key] || key;
        var val = snapshot[key] || "";
        var isChanged = changedFields.indexOf(key) !== -1;
        if(key === "type_coffrage") val = TYPES_ARMOIRES[val] || val;
        var displayVal = val || "(vide)";
        if(isChanged){
          html += '<div class="history-field"><span class="snap-label">'+lbl+' : </span><span class="snap-value snap-changed">'+displayVal+'</span></div>';
        } else {
          html += '<div class="history-field"><span class="snap-label">'+lbl+' : </span><span class="snap-value">'+displayVal+'</span></div>';
        }
      });

      html += '</div></div>';
    });
    historyList.innerHTML = html;
  }

  // ============================================================
  //  AJOUTER UNE INTERVENTION
  // ============================================================
  async function addIntervention(){
    var dateInput = document.getElementById("newInterDate");
    var descInput = document.getElementById("newInterDesc");
    if(!dateInput || !descInput) return;

    var dateVal = dateInput.value.trim();
    var descVal = descInput.value.trim();

    if(!dateVal && !descVal){
      alert("Veuillez remplir au moins un champ.");
      return;
    }

    var techName = "";
    var techInput = document.getElementById("input_technicien");
    if(techInput) techName = techInput.value.trim();
    if(!techName) techName = currentData.technicien || "Inconnu";

    var {error} = await supabase
      .from("interventions")
      .insert({
        installation_id: installationId,
        date_intervention: dateVal,
        description: descVal,
        created_by: techName
      });

    if(error){
      alert("Erreur : " + error.message);
      return;
    }

    // Historique
    var snapshot = buildSnapshot();
    await supabase
      .from("historique")
      .insert({
        installation_id: installationId,
        technicien: techName,
        modifications: JSON.stringify(["_intervention_ajout"]),
        snapshot: JSON.stringify(snapshot)
      });

    await loadInterventions();
    renderEdit();
  }

  // ============================================================
  //  SUPPRIMER UNE INTERVENTION
  // ============================================================
  async function deleteIntervention(interId){
    var inter = interventions.find(function(i){ return i.id === interId; });
    if(!inter) return;
    if(!confirm("Supprimer cette intervention ?")) return;

    var techName = "";
    var techInput = document.getElementById("input_technicien");
    if(techInput) techName = techInput.value.trim();
    if(!techName) techName = currentData.technicien || "Inconnu";

    var {error} = await supabase
      .from("interventions")
      .delete()
      .eq("id", interId);

    if(error){
      alert("Erreur : " + error.message);
      return;
    }

    var snapshot = buildSnapshot();
    await supabase
      .from("historique")
      .insert({
        installation_id: installationId,
        technicien: techName,
        modifications: JSON.stringify(["_intervention_suppression"]),
        snapshot: JSON.stringify(snapshot)
      });

    await loadInterventions();
    renderEdit();
  }

  // ============================================================
  //  MODIFIER UNE INTERVENTION
  // ============================================================
  async function updateIntervention(interId, newDate, newDesc){
    var {error} = await supabase
      .from("interventions")
      .update({date_intervention: newDate, description: newDesc})
      .eq("id", interId);

    if(error) alert("Erreur : " + error.message);
  }

  // ============================================================
  //  BIND EVENTS INTERVENTIONS
  // ============================================================
  function bindInterventionEvents(){
    var addBtn = document.getElementById("addInterBtn");
    if(addBtn){
      addBtn.addEventListener("click", function(){ addIntervention(); });
    }

    var deleteBtns = document.querySelectorAll(".inter-delete");
    deleteBtns.forEach(function(btn){
      btn.addEventListener("click", function(){
        var id = parseInt(btn.getAttribute("data-id"));
        deleteIntervention(id);
      });
    });

    var dateInputs = document.querySelectorAll(".inter-date:not([disabled])");
    var descInputs = document.querySelectorAll(".inter-desc:not([disabled])");

    dateInputs.forEach(function(input){
      input.addEventListener("change", function(){
        var index = parseInt(input.getAttribute("data-index"));
        var inter = interventions[index];
        if(inter){
          var descEl = document.querySelector('.inter-desc[data-index="'+index+'"]');
          updateIntervention(inter.id, input.value, descEl ? descEl.value : inter.description);
        }
      });
    });

    descInputs.forEach(function(input){
      input.addEventListener("change", function(){
        var index = parseInt(input.getAttribute("data-index"));
        var inter = interventions[index];
        if(inter){
          var dateEl = document.querySelector('.inter-date[data-index="'+index+'"]');
          updateIntervention(inter.id, dateEl ? dateEl.value : inter.date_intervention, input.value);
        }
      });
    });
  }

  // ============================================================
  //  CONSTRUIRE UN SNAPSHOT DE TOUTES LES DONNÉES
  // ============================================================
  function buildSnapshot(){
    var snap = {};
    Object.keys(FIELDS).forEach(function(key){
      var input = document.getElementById("input_"+key);
      if(input) snap[key] = input.value.trim();
      else snap[key] = currentData[key] || "";
    });
    Object.keys(VERIF_FIELDS).forEach(function(key){
      var input = document.getElementById("input_"+key);
      if(input) snap[key] = input.value.trim();
      else snap[key] = currentData[key] || "";
    });
    var labelInput = document.getElementById("input_label_controle");
    if(labelInput) snap.label_controle = labelInput.value.trim();
    else snap.label_controle = currentData.label_controle || "";
    return snap;
  }

  // ============================================================
  //  SAUVEGARDER LES DONNÉES
  // ============================================================
  async function saveData(){
    var newData = {};
    var changedKeys = [];

    // Champs principaux
    Object.keys(FIELDS).forEach(function(key){
      var input = document.getElementById("input_"+key);
      if(input && !input.disabled){
        var newVal = input.value.trim();
        var oldVal = currentData[key] || "";
        if(newVal !== oldVal) changedKeys.push(key);
        newData[key] = newVal;
      }
    });

    // Champs vérifications
    Object.keys(VERIF_FIELDS).forEach(function(key){
      var input = document.getElementById("input_"+key);
      if(input && !input.disabled){
        var newVal = input.value.trim();
        var oldVal = currentData[key] || "";
        if(newVal !== oldVal) changedKeys.push(key);
        newData[key] = newVal;
      }
    });

    // Label du contrôle (admin)
    var labelInput = document.getElementById("input_label_controle");
    if(labelInput){
      var newLabel = labelInput.value.trim();
      if(newLabel !== (currentData.label_controle || "")) changedKeys.push("label_controle");
      newData.label_controle = newLabel;
    }

    // Si rien n'a changé
    if(changedKeys.length === 0){
      editMode = false;
      accessLevel = null;
      renderView();
      editBtn.style.display = "";
      saveBtn.style.display = "none";
      cancelBtn.style.display = "none";
      return;
    }

    // Technicien
    var techName = "";
    var techInput = document.getElementById("input_technicien");
    if(techInput) techName = techInput.value.trim();
    if(!techName) techName = currentData.technicien || "Inconnu";

    // Sauvegarder
    var {error} = await supabase
      .from("installations")
      .update(newData)
      .eq("id", installationId);

    if(error){
      alert("Erreur lors de la sauvegarde : " + error.message);
      return;
    }

    // Snapshot complet pour l'historique
    var snapshot = buildSnapshot();

    await supabase
      .from("historique")
      .insert({
        installation_id: installationId,
        technicien: techName,
        modifications: JSON.stringify(changedKeys),
        snapshot: JSON.stringify(snapshot)
      });

    editMode = false;
    accessLevel = null;
    editBtn.style.display = "";
    saveBtn.style.display = "none";
    cancelBtn.style.display = "none";
    await loadData();
    await loadHistory();
  }

  // ============================================================
  //  MODAL MOT DE PASSE
  // ============================================================
  function showModal(){
    modalOverlay.classList.add("open");
    modalError.textContent = "";
    passwordInput.value = "";
    passwordInput.focus();
  }

  function hideModal(){
    modalOverlay.classList.remove("open");
    modalError.textContent = "";
    passwordInput.value = "";
  }

  function checkPassword(){
    var pwd = passwordInput.value;
    if(pwd === PASSWORD_ADMIN){
      accessLevel = "admin";
      hideModal();
      enterEditMode();
    } else if(pwd === PASSWORD_TECH){
      accessLevel = "tech";
      hideModal();
      enterEditMode();
    } else {
      modalError.textContent = "Mot de passe incorrect.";
      passwordInput.value = "";
      passwordInput.focus();
    }
  }

  // ============================================================
  //  MODE ÉDITION
  // ============================================================
  function enterEditMode(){
    editMode = true;
    editBtn.style.display = "none";
    saveBtn.style.display = "";
    cancelBtn.style.display = "";
    renderEdit();
  }

  function cancelEdit(){
    editMode = false;
    accessLevel = null;
    editBtn.style.display = "";
    saveBtn.style.display = "none";
    cancelBtn.style.display = "none";
    renderView();
  }

  // ============================================================
  //  SIDEBAR HISTORIQUE
  // ============================================================
  function openSidebar(){
    sidebar.classList.add("open");
    sidebarOverlay.classList.add("open");
    loadHistory();
  }

  function closeSidebar(){
    sidebar.classList.remove("open");
    sidebarOverlay.classList.remove("open");
  }

  // ============================================================
  //  ÉVÉNEMENTS
  // ============================================================
  editBtn.addEventListener("click", function(){ showModal(); });
  saveBtn.addEventListener("click", function(){ saveData(); });
  cancelBtn.addEventListener("click", function(){ cancelEdit(); });
  $("menuBtn").addEventListener("click", function(){ openSidebar(); });
  $("sidebarClose").addEventListener("click", function(){ closeSidebar(); });
  sidebarOverlay.addEventListener("click", function(){ closeSidebar(); });
  $("modalConfirm").addEventListener("click", function(){ checkPassword(); });
  $("modalCancel").addEventListener("click", function(){ hideModal(); });
  passwordInput.addEventListener("keydown", function(e){
    if(e.key === "Enter") checkPassword();
  });

  // ============================================================
  //  DÉMARRAGE
  // ============================================================
  loadData();

})();
</script>
</body>
</html>
